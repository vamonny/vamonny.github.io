<!-- FADING VIDEO -->
<script type="text/babel">
const FadingVideo = ({ src, className = "", style = {} }) => {
  const videoRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const fadingOutRef = React.useRef(false);
  const FADE_MS = 500;
  const FADE_OUT_LEAD = 0.55;

  const fadeTo = (target, duration) => {
    const video = videoRef.current;
    if (!video) return;
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    const start = parseFloat(video.style.opacity || "0");
    const startTime = performance.now();
    const tick = (now) => {
      const t = Math.min((now - startTime) / duration, 1);
      const eased = t;
      video.style.opacity = (start + (target - start) * eased).toString();
      if (t < 1) rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
  };

  React.useEffect(() => {
    const video = videoRef.current;
    if (!video) return;
    const onLoaded = () => { video.style.opacity = "0"; video.play().catch(()=>{}); fadeTo(1, FADE_MS); };
    const onTime = () => {
      if (!fadingOutRef.current && video.duration && (video.duration - video.currentTime) <= FADE_OUT_LEAD && (video.duration - video.currentTime) > 0) {
        fadingOutRef.current = true;
        fadeTo(0, FADE_OUT_LEAD * 1000);
      }
    };
    const onEnded = () => {
      video.style.opacity = "0";
      setTimeout(() => {
        video.currentTime = 0;
        video.play().catch(()=>{});
        fadingOutRef.current = false;
        fadeTo(1, FADE_MS);
      }, 100);
    };
    video.addEventListener('loadeddata', onLoaded);
    video.addEventListener('timeupdate', onTime);
    video.addEventListener('ended', onEnded);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      video.removeEventListener('loadeddata', onLoaded);
      video.removeEventListener('timeupdate', onTime);
      video.removeEventListener('ended', onEnded);
    };
  }, []);

  return (
    <video ref={videoRef} autoPlay muted playsInline preload="auto" className={className} style={{ opacity: 0, ...style }}>
      <source src={src} type="video/mp4" />
    </video>
  );
};
window.FadingVideo = FadingVideo;
</script>

<!-- BLUR TEXT -->
<script type="text/babel">
const BlurText = ({ text, className = "" }) => {
  const { motion } = window.Motion;
  const ref = React.useRef(null);
  const [inView, setInView] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setInView(true); }, { threshold: 0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  const words = text.split(' ');
  return (
    <p ref={ref} className={className} style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}>
      {words.map((word, i) => (
        <motion.span
          key={i}
          initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
          animate={inView ? {
            filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
            opacity: [0, 0.5, 1],
            y: [50, -5, 0]
          } : {}}
          transition={{ duration: 0.7, times: [0, 0.5, 1], ease: 'easeOut', delay: (i * 100) / 1000 }}
          style={{ display: 'inline-block', marginRight: '0.28em' }}
        >
          {word}
        </motion.span>
      ))}
    </p>
  );
};
window.BlurText = BlurText;
</script>
